{% extends 'base.html' %}

{% block title %}Cambiar estado de almacén{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-12 col-lg-6">
        <div class="card border-0 shadow-sm">
            <div class="card-body p-4">
                <h1 class="h4">Cambiar estado de almacén</h1>
                <p class="mb-4">
                    {% if object.activo %}
                        Confirma desactivar <strong>{{ object.nombre }}</strong>.
                    {% else %}
                        Confirma activar <strong>{{ object.nombre }}</strong>.
                    {% endif %}
                </p>
                <form method="post">
                    {% csrf_token %}
                    <div class="d-flex gap-2 mt-4">
                        <a href="{% url 'almacenes:list' %}" class="btn btn-outline-secondary">Cancelar</a>
                        <button type="submit" class="btn {% if object.activo %}btn-danger{% else %}btn-success{% endif %}">
                            {% if object.activo %}Desactivar{% else %}Activar{% endif %}
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
