{% extends 'base.html' %}

{% block title %}Marcas{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
    <div>
        <h1 class="h4 mb-0">Marcas</h1>
        <p class="text-muted mb-0">Catalogo de marcas</p>
    </div>
    <div class="d-flex gap-2">
        <a href="{% url 'productos:list' %}" class="btn btn-outline-secondary">Volver a productos</a>
        <a href="{% url 'productos:brand_create' %}" class="btn btn-dark">Nueva marca</a>
    </div>
</div>

<div class="card border-0 shadow-sm">
    <div class="table-responsive">
        <table class="table table-hover align-middle mb-0">
            <thead class="table-light">
                <tr>
                    <th>Nombre</th>
                    <th class="text-end">Acciones</th>
                </tr>
            </thead>
            <tbody>
                {% for brand in brands %}
                <tr>
                    <td>{{ brand.name }}</td>
                    <td class="text-end">
                        <a href="{% url 'productos:brand_update' brand.pk %}" class="btn btn-sm btn-outline-secondary"><i class="fas fa-pen"></i></a>
                        <a href="{% url 'productos:brand_delete' brand.pk %}" class="btn btn-sm btn-outline-danger"><i class="fas fa-trash"></i></a>
                    </td>
                </tr>
                {% empty %}
                <tr><td colspan="2" class="text-center py-4 text-muted">No hay marcas registradas.</td></tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
{% endblock %}
