{% extends 'base.html' %}

{% block title %}Confirmar acción{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-12 col-md-6">
        <div class="card border-0 shadow-sm">
            <div class="card-body p-4">
                <h1 class="h5 mb-3">¿Desactivar este formato?</h1>
                <p class="text-muted mb-4">
                    {% if object.is_active %}
                        Se desactivará el formato <strong>{{ object.name }}</strong>
                    {% else %}
                        Se reactivará el formato <strong>{{ object.name }}</strong>
                    {% endif %}
                </p>
                <form method="post" class="d-flex gap-2">
                    {% csrf_token %}
                    <a href="{% url 'productos:formatos' %}" class="btn btn-outline-secondary">Cancelar</a>
                    <button type="submit" class="btn {% if object.is_active %}btn-danger{% else %}btn-success{% endif %}">
                        {% if object.is_active %}Desactivar{% else %}Reactivar{% endif %}
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
